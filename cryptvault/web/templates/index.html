<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptVault</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔒 CryptVault</h1>
            <p>Zero-Knowledge Encrypted File Storage</p>
        </header>

        <section class="auth-section">
            <label for="master-password">Master Password:</label>
            <input type="password" id="master-password" placeholder="Enter password to encrypt/decrypt">
            <small>Your password never leaves your browser.</small>
        </section>

        <section class="upload-section">
            <h2>Upload File</h2>
            <input type="file" id="file-input">
            <button id="upload-btn">Encrypt & Upload</button>
            <div id="upload-status"></div>
        </section>

        <section class="vault-section">
            <h2>Your Vault</h2>
            <table id="files-table">
                <thead>
                    <tr>
                        <th>File Name</th>
                        <th>Size (Bytes)</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for file in files %}
                    <tr>
                        <td>{{ file.original_name }}</td>
                        <td>{{ file.size }}</td>
                        <td>
                            <button onclick="downloadAndDecrypt('{{ file.id }}', '{{ file.original_name }}')">
                                Download & Decrypt
                            </button>
                        </td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="3">Vault is empty.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </section>
    </div>
    
    <script src="/static/app.js"></script>
</body>
</html>
